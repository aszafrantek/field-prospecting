<style>
:root {
  --bg: #f8fafc; --surface: #fff; --border: #e2e8f0; --border-light: #f1f5f9;
  --text: #0f172a; --muted: #64748b;
  --blue: #2563eb; --blue-bg: #eff6ff;
  --green: #16a34a; --green-bg: #f0fdf4;
  --orange: #ea580c; --orange-bg: #fff7ed;
  --red: #dc2626; --red-bg: #fef2f2;
  --purple: #7c3aed; --purple-bg: #faf5ff;
  --gold: #b45309; --gold-bg: #fef3c7;
  --teal: #0f766e; --teal-bg: #f0fdfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

/* ── Header ── */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.hdr-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.logo { font-size: 17px; font-weight: 800; color: var(--blue); white-space: nowrap; }
.plan-sel { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; font-weight: 500; }
.filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.search { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 13px; width: 140px; flex-shrink: 0; }
.search:focus { outline: none; border-color: var(--blue); }
.fsel { padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 12px; font-weight: 500; flex-shrink: 0; cursor: pointer; }

/* ── View Tabs (Prospects / No-Visit) ── */
.view-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); }
.vtab { flex: 1; padding: 8px 10px; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.vtab.active { color: var(--blue); border-bottom-color: var(--blue); }
.vtab .nvcount { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; background: var(--green-bg); color: var(--green); margin-left: 4px; }

/* ── Stats ── */
.stats { background: var(--surface); border-bottom: 1px solid var(--border-light); padding: 6px 14px; display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; }
.stats::-webkit-scrollbar { display: none; }
.stat { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-size: 12px; color: var(--muted); flex-shrink: 0; }
.stat b { font-size: 15px; font-weight: 700; color: var(--text); }
.stat b.bl { color: var(--blue); } .stat b.gr { color: var(--green); } .stat b.or { color: var(--orange); } .stat b.gd { color: var(--gold); }

/* ── Grid ── */
.grid { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 10px; }

/* ── Day section headers ── */
.day-section { grid-column: 1 / -1; display: contents; }
.day-header { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; padding: 8px 4px 4px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.day-label { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.day-count { font-size: 12px; color: var(--muted); opacity: .7; }
.route-btn { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #fff; background: #1a73e8; border-radius: 6px; padding: 4px 10px; text-decoration: none; white-space: nowrap; }
.route-btn:hover { background: #1558b0; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid transparent; border-radius: 10px; padding: 13px; }
.card.sv { border-left-color: #818cf8; } .card.sf { border-left-color: var(--orange); }
.card.sw { border-left-color: var(--green); } .card.sn { border-left-color: #f87171; }
.card.sd { border-left-color: #0ea5e9; }
#syncStatus { font-size: 11px; white-space: nowrap; color: var(--muted); flex-shrink: 0; }
.sync-btn { font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; white-space: nowrap; flex-shrink: 0; }

.card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.shop-name { font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1; }
.day-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.dh { background: var(--green-bg); color: var(--green); }
.d1 { background: var(--green-bg); color: var(--green); }
.d2 { background: var(--blue-bg); color: var(--blue); }
.d3 { background: var(--purple-bg); color: var(--purple); }
.d4 { background: var(--orange-bg); color: var(--orange); }
.d5 { background: var(--red-bg); color: var(--red); }
.d6 { background: var(--teal-bg); color: var(--teal); }
.d7 { background: var(--gold-bg); color: var(--gold); }
.d8 { background: #fce7f3; color: #be185d; }
.d9 { background: #e0f2fe; color: #0369a1; }
.d10 { background: #ecfccb; color: #3f6212; }

.addr { font-size: 12px; color: var(--muted); margin-bottom: 3px; line-height: 1.4; }
.phone { font-size: 13px; font-weight: 600; color: var(--blue); text-decoration: none; display: block; margin-bottom: 7px; }
.sig-notes { font-size: 11px; color: var(--muted); margin-bottom: 7px; line-height: 1.4; }

.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.tm { background: var(--teal-bg); color: var(--teal); }
.ta { background: var(--blue-bg); color: var(--blue); }
.tp { background: #dc2626; color: #bfdbfe; }
.tb { background: #fbbf24; color: #111111; }
.tM { background: var(--purple-bg); color: var(--purple); }
.tq { background: var(--gold-bg); color: var(--gold); }
.tc { background: var(--orange-bg); color: var(--orange); }
.ts { background: var(--border-light); color: var(--muted); }

/* Signal dots */
.sig-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.dots { display: flex; gap: 3px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.on { background: #fbbf24; } .dot.hi { background: var(--teal); }
.sig-lbl { font-size: 11px; color: var(--muted); font-weight: 500; }

/* Verify buttons */
.verify { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.vbtn { font-size: 10px; font-weight: 500; padding: 3px 7px; border-radius: 6px; border: 1px solid var(--border-light); background: var(--bg); color: #94a3b8; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; opacity: 0.75; }
.vbtn:active { background: var(--border-light); opacity: 1; }
.vbtn.gd-btn { color: #94a3b8; border-color: var(--border-light); background: var(--bg); opacity: 0.75; }
.vbtn.tb { background: #fbbf24; color: #111111; border-color: #fbbf24; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.vbtn.tp { background: #dc2626; color: #bfdbfe; border-color: #dc2626; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.tf  { background: #f97316; color: #ffffff; }
.tfp { background: #1e293b; color: #f97316; }
.te  { background: #1d4ed8; color: #fde68a; }
.vbtn.tf  { background: #f97316; color: #ffffff; border-color: #f97316; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.vbtn.tfp { background: #1e293b; color: #f97316; border-color: #f97316; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.vbtn.te  { background: #1d4ed8; color: #fde68a; border-color: #1d4ed8; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.trp  { background: #16a34a; color: #ffffff; }
.tcfx { background: #003087; color: #ffffff; }
.vbtn.trp  { background: #16a34a; color: #ffffff; border-color: #16a34a; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.vbtn.tcfx { background: #003087; color: #ffffff; border-color: #003087; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }
.tac  { background: #4338ca; color: #ffffff; }
.vbtn.tac { background: #4338ca; color: #ffffff; border-color: #4338ca; opacity: 1; font-weight: 700; font-size: 11px; padding: 4px 8px; }

/* Actions */
.actions { display: flex; gap: 6px; align-items: center; }
.status-sel { flex: 1; padding: 5px 6px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; background: var(--surface); color: var(--text); cursor: pointer; }
.notes-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.notes-btn.has { background: var(--gold-bg); border-color: #fcd34d; color: var(--gold); }
.notes-area { width: 100%; margin-top: 6px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--bg); color: var(--text); resize: none; min-height: 50px; font-family: inherit; display: none; }
.notes-area:focus { outline: none; border-color: var(--blue); }
.notes-preview { margin-top: 5px; font-size: 11px; color: var(--gold); font-style: italic; cursor: pointer; }

/* ── No-Visit List ── */
.nv-grid { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.nv-header { padding: 10px 14px 0; font-size: 12px; color: var(--muted); line-height: 1.5; }
.nv-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 10px; padding: 12px; }
.nv-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.nv-city { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.nv-note { font-size: 11px; color: var(--muted); line-height: 1.4; }
.nv-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-bottom: 4px; }
.nv-confirmed { background: var(--green-bg); color: var(--green); }
.nv-empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; grid-column: 1/-1; }

.empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; grid-column: 1/-1; }

@media (max-width: 500px) { .grid { grid-template-columns: 1fr; padding: 8px; gap: 8px; } .search { width: 120px; } .nv-grid { grid-template-columns: 1fr; padding: 8px; } }
</style>
</head>

  "Cape Cod / Salem NH 3-Day":       "Hyannis, MA",
  "Portsmouth NH / Southern Maine 5-Day": "Downtown Portsmouth, NH",
  "New Jersey — Parsippany 10-Day":  "Parsippany, NJ",
  "Mobile AL 10-Day":                "Downtown Mobile, AL",
  "Winston-Salem 3-Day":             "Downtown Winston-Salem, NC"
};

function buildMapsURL(origin, shops) {
  const addrs = [origin, ...shops.map(s => s.address)];
  return 'https://www.google.com/maps/dir/' + addrs.map(a => encodeURIComponent(a)).join('/');
}

// ─────────────────────────────────────────────────────────────
const urlSync = new URLSearchParams(location.search).get('sync');
const SYNC_KEY = (() => {
  if (urlSync) { localStorage.setItem('fp_sync_key', urlSync); return urlSync; }
  const k = localStorage.getItem('fp_sync_key') || crypto.randomUUID();
  localStorage.setItem('fp_sync_key', k);
  return k;
})();

firebase.initializeApp({
  apiKey: "AIzaSyB5y8wut70Ww18SOQkV4FYP-zCnnQ5489Q",
  authDomain: "tekmetric-prospecting.firebaseapp.com",
  projectId: "tekmetric-prospecting",
  storageBucket: "tekmetric-prospecting.firebasestorage.app",
  messagingSenderId: "979981153270",
  appId: "1:979981153270:web:5c62e6416a13d72402cdd7"
});
const db = firebase.firestore();
const shopsCol = () => db.collection('sessions').doc(SYNC_KEY).collection('shops');

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = s === 'saved' ? '✓ Synced' : s === 'saving' ? '⟳ Saving…' : '⚠ Offline';
  el.style.color  = s === 'saved' ? 'var(--green)' : s === 'saving' ? 'var(--muted)' : 'var(--orange)';
}

function showSyncKey() {
  const link = location.origin + location.pathname + '?sync=' + SYNC_KEY;
  if (navigator.share) {
    navigator.share({ title: 'Field Prospecting Sync', url: link });
  } else {
    navigator.clipboard.writeText(link).then(() =>
      alert('✅ Sync link copied!\n\nOpen this URL on your phone or iPad to share notes & status:\n\n' + link)
    ).catch(() => prompt('Copy this sync link and open it on your other device:', link));
  }
}

function loadFromFirebase() {
  setSyncStatus('saving');
  shopsCol().get().then(snap => {
    snap.forEach(doc => {
      const d = doc.data();
      if (d.status) statusMap[doc.id] = d.status;
      if (d.notes)  notesMap[doc.id]  = d.notes;
    });
    try{ localStorage.setItem('fp_status', JSON.stringify(statusMap)); }catch(e){}
    try{ localStorage.setItem('fp_notes',  JSON.stringify(notesMap));  }catch(e){}
    setSyncStatus('saved');
    loadPlan(planSel.value);
  }).catch(() => setSyncStatus('offline'));
}

function startRealtimeSync() {
  shopsCol().onSnapshot(snap => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added' || change.type === 'modified') {
        const d = change.doc.data(), id = change.doc.id;
        const newStatus = d.status || 'new';
        const newNotes  = d.notes  || '';
        const changed = statusMap[id] !== newStatus || (notesMap[id]||'') !== newNotes;
        statusMap[id] = newStatus;
        notesMap[id]  = newNotes;
        if (changed) {
          const card = document.getElementById('card-'+id);
          if (card) {
            const sel = card.querySelector('.status-sel');
            if (sel && sel.value !== newStatus) { sel.value = newStatus; onStatus(sel, true); }
            const ta = card.querySelector('.notes-area');
            if (ta && ta !== document.activeElement && ta.value !== newNotes) {
              ta.value = newNotes;
              const p = currentPlan.find(x=>x.id===id);
              if (p) p.userNotes = newNotes;
              const btn = card.querySelector('.notes-btn');
              if (btn) btn.classList.toggle('has', !!newNotes);
              let prev = card.querySelector('.notes-preview');
              if (newNotes) {
                if (!prev) { prev = document.createElement('div'); prev.className='notes-preview'; prev.onclick=()=>toggleNotes(id); ta.before(prev); }
                prev.textContent = '📌 ' + newNotes;
              } else if (prev) prev.remove();
            }
          }
        }
      }
    });
    setSyncStatus('saved');
    try{ localStorage.setItem('fp_status', JSON.stringify(statusMap)); }catch(e){}
    try{ localStorage.setItem('fp_notes',  JSON.stringify(notesMap));  }catch(e){}
  }, () => setSyncStatus('offline'));
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let statusMap = {}, notesMap = {}, currentPlan = [], currentView = 'prospects';
try { statusMap = JSON.parse(localStorage.getItem('fp_status') || '{}'); } catch(e){}
try { notesMap  = JSON.parse(localStorage.getItem('fp_notes')  || '{}'); } catch(e){}

const noteTimers = {};
function saveStatus(id) {
  setSyncStatus('saving');
  shopsCol().doc(id).set({ status: statusMap[id]||'new', notes: notesMap[id]||'', updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, {merge:true})
    .then(()=>setSyncStatus('saved')).catch(()=>setSyncStatus('offline'));
  try{ localStorage.setItem('fp_status', JSON.stringify(statusMap)); }catch(e){}
}
function saveNotes(id) {
  clearTimeout(noteTimers[id]);
  noteTimers[id] = setTimeout(() => {
    setSyncStatus('saving');
    shopsCol().doc(id).set({ status: statusMap[id]||'new', notes: notesMap[id]||'', updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, {merge:true})
      .then(()=>setSyncStatus('saved')).catch(()=>setSyncStatus('offline'));
    try{ localStorage.setItem('fp_notes', JSON.stringify(notesMap)); }catch(e){}
  }, 800);
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
const planNames = Object.keys(PLANS);
const planSel = document.getElementById('planSel');
planSel.innerHTML = planNames.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
planSel.addEventListener('change', () => { currentView = 'prospects'; switchView('prospects'); loadPlan(planSel.value); });
loadPlan(planNames[0]);
loadFromFirebase();
startRealtimeSync();

['searchInput','dayFilter','statusFilter','sigFilter'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});

function switchView(view) {
  currentView = view;
  document.getElementById('tabProspects').classList.toggle('active', view === 'prospects');
  document.getElementById('tabNoVisit').classList.toggle('active', view === 'novisit');
  document.getElementById('prospectFilters').style.display = view === 'prospects' ? 'flex' : 'none';
  document.getElementById('statsBar').style.display = view === 'prospects' ? 'flex' : 'none';
  document.getElementById('grid').style.display = view === 'prospects' ? '' : 'none';
  document.getElementById('nvPanel').style.display = view === 'novisit' ? '' : 'none';
  if (view === 'novisit') renderNoVisit();
}

function loadPlan(name) {
  currentPlan = (PLANS[name] || []).map(p => ({
    ...p,
    status: statusMap[p.id] || 'new',
    userNotes: notesMap[p.id] || ''
  }));
  // Rebuild day filter from this plan's actual days
  const days = [...new Set(currentPlan.map(p => p.day))].sort((a,b)=>{
    const order = ['Half-day','Day 1','Day 2','Day 3','Day 4','Day 5','Day 6','Day 7','Day 8','Day 9','Day 10'];
    return order.indexOf(a) - order.indexOf(b);
  });
  const df = document.getElementById('dayFilter');
  df.innerHTML = '<option value="all">All days</option>' + days.map(d=>`<option value="${d}">${d}</option>`).join('');
  const nvList = NO_VISIT[name] || [];
  document.getElementById('nvCount').textContent = nvList.length || '0';
  render();
}

// ─────────────────────────────────────────────────────────────
// RENDER — PROSPECTS
// ─────────────────────────────────────────────────────────────
function render() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const day    = document.getElementById('dayFilter').value;
  const status = document.getElementById('statusFilter').value;
  const sig    = document.getElementById('sigFilter').value;

  const list = currentPlan.filter(p => {
    if (day    !== 'all' && p.day    !== day)    return false;
    if (status !== 'all' && p.status !== status) return false;
    if (sig    !== 'all' && !(p.tags||[]).includes(sig)) return false;
    if (q && !(p.shop+p.address+p.notes+'').toLowerCase().includes(q)) return false;
    return true;
  });

  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">No shops match your filters.</div>';
  } else {
    const dayOrder = ['Half-day','Day 1','Day 2','Day 3','Day 4','Day 5','Day 6','Day 7','Day 8','Day 9','Day 10'];
    const grouped = {};
    list.forEach(p => { (grouped[p.day] = grouped[p.day]||[]).push(p); });
    const orderedDays = Object.keys(grouped).sort((a,b) => dayOrder.indexOf(a) - dayOrder.indexOf(b));
    const origin = PLAN_ORIGINS[planSel.value] || '';
    document.getElementById('grid').innerHTML = orderedDays.map(d => {
      const shops = grouped[d];
      const mapsUrl = buildMapsURL(origin, shops);
      const mapsBtn = origin ? `<a class="route-btn" href="${mapsUrl}" target="_blank" rel="noopener">📍 Open Route in Maps</a>` : '';
      return `<div class="day-header"><span class="day-label">${esc(d)}</span><span class="day-count">${shops.length} stop${shops.length!==1?'s':''}</span>${mapsBtn}</div>${shops.map(cardHTML).join('')}`;
    }).join('');
  }

  document.querySelectorAll('.status-sel').forEach(el =>
    el.addEventListener('change', e => onStatus(e.target)));
  document.querySelectorAll('.notes-btn').forEach(el =>
    el.addEventListener('click', e => toggleNotes(e.currentTarget.dataset.id)));
  document.querySelectorAll('.notes-area').forEach(el =>
    el.addEventListener('blur', e => onNote(e.target)));

  updateStats();
}

// RENDER — NO-VISIT
// ─────────────────────────────────────────────────────────────
function renderNVCards(list, header, grid) {
  if (!list.length) {
    header.textContent = '';
    grid.innerHTML = '<div class="nv-empty">No existing Tekmetric customers identified in this area.</div>';
    return;
  }
  header.innerHTML = `<b>${list.length} existing Tekmetric customer${list.length!==1?'s':''}</b> near this route — use these as proof points when prospects ask "who else is using it nearby?"`;
  grid.innerHTML = list.map(nv => `
<div class="nv-card">
  <span class="nv-badge nv-confirmed">✓ Tekmetric Customer</span>
  <div class="nv-name">${esc(nv.shop)}</div>
  ${nv.address ? `<div class="nv-city">📍 ${esc(nv.address)}, ${esc(nv.city)}</div>` : `<div class="nv-city">📍 ${esc(nv.city)}</div>`}
  ${nv.notes ? `<div class="nv-note">${esc(nv.notes)}</div>` : ''}
</div>`).join('');
}

function renderNoVisit() {
  const name = planSel.value;
  const header = document.getElementById('nvHeader');
  const grid = document.getElementById('nvGrid');
  const hardcoded = NO_VISIT[name] || [];

  // For NJ plan: dynamic fetch from Google Sheet, merge with hardcoded
  if (name.includes('New Jersey') || name.includes('Parsippany')) {
    header.innerHTML = 'Loading existing customers from database…';
    grid.innerHTML = '<div class="nv-empty">Fetching…</div>';
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1a_mX62jYjrWNBNjLzrK_SlvdL4VMnQ3cMAfli96LWs0/gviz/tq?tqx=out:csv&sheet=report1780072999302&tq=select%20*%20where%20H%3D'NJ'";
    fetch(sheetUrl).then(r=>r.text()).then(csv=>{
      const lines = csv.trim().split('\n').slice(1);
      const parsed = lines.map(line=>{
        const cols = [];
        let cur='', inQ=false;
        for(const ch of line+','){
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=ch;
        }
        // col 0=name, col 5=city(?), col 7=state
        const shop = cols[0]||'';
        const city = (cols[5]||cols[4]||'').replace(/^"|"$/g,'') + ', NJ';
        return shop ? {shop, city, notes:'Existing Tekmetric customer — Google Sheet confirmed'} : null;
      }).filter(Boolean);
      // Merge, dedup by shop name
      const seen = new Set(hardcoded.map(x=>x.shop.toLowerCase()));
      const merged = [...hardcoded, ...parsed.filter(x=>!seen.has(x.shop.toLowerCase()))];
      document.getElementById('nvCount').textContent = merged.length || '0';
      renderNVCards(merged, header, grid);
    }).catch(()=>{
      document.getElementById('nvCount').textContent = hardcoded.length || '0';
      renderNVCards(hardcoded, header, grid);
    });
    return;
  }

  renderNVCards(hardcoded, header, grid);
}

function cardHTML(p) {
  const tags = p.tags || [];
  const score = mitchellScore(p);
  const dayCl = {'Half-day':'dh','Day 1':'d1','Day 2':'d2','Day 3':'d3','Day 4':'d4','Day 5':'d5','Day 6':'d6','Day 7':'d7','Day 8':'d8','Day 9':'d9','Day 10':'d10'}[p.day]||'d1';
  const stCl  = {visited:'sv',followup:'sf',won:'sw','not-interested':'sn','demo-booked':'sd'}[p.status]||'';

  const tagsHtml = [
    tags.includes('Mitchell')   ? `<span class="tag tm">Mitchell★</span>`  : '',
    tags.includes('AutoTechIQ') ? `<span class="tag ta">AutoTechIQ</span>` : '',
    tags.includes('Technet')    ? `<span class="tag tp" style="padding:2px 5px;display:inline-flex;align-items:center;gap:3px"><img src="${TN_LOGO}" height="11" style="vertical-align:middle;display:block"></span>` : '',
    tags.includes('BG')         ? `<span class="tag tb" style="padding:2px 5px;display:inline-flex;align-items:center;gap:3px"><img src="${BG_LOGO}" height="11" style="vertical-align:middle;display:block"></span>` : '',
    tags.includes('Fisher')     ? `<span class="tag tf" style="padding:2px 5px;display:inline-flex;align-items:center;gap:3px"><img src="${FISHER_LOGO}" height="13" style="vertical-align:middle;display:block;border-radius:2px"></span>` : '',
    tags.includes('FMP')        ? `<span class="tag tfp" style="padding:2px 5px;display:inline-flex;align-items:center;gap:3px"><img src="${FMP_LOGO}" height="13" style="vertical-align:middle;display:block;border-radius:2px"></span>` : '',
    tags.includes('Euro')       ? `<span class="tag te">🇪🇺 Euro</span>` : '',
    tags.includes('MSO')        ? `<span class="tag tM">MSO</span>`        : '',
    tags.includes('Marquee')    ? `<span class="tag tq">★ MARQUEE</span>`  : '',
    tags.includes('Caveat')     ? `<span class="tag tc">⚠ Verify</span>`   : '',
    tags.includes('Assoc')      ? `<span class="tag tac">🔧 Assoc</span>`    : '',
    p.stars ? `<span class="tag ts">★${p.stars}${p.reviewInfo?' · '+p.reviewInfo:''}</span>` : '',
  ].filter(Boolean).join('');

  const dots = [1,2,3,4,5].map(i =>
    `<div class="dot${i<=score?(score>=4?' hi':' on'):''}"></div>`).join('');
  const sigLbl = score>=4?'High Mitchell signal':score>=2?'Moderate signal':'Low signal';

  const shopQ  = encodeURIComponent(p.shop + ' ' + (p.address||'').split(',').slice(-2).join(','));
  const nameQ  = encodeURIComponent(p.shop);
  const domainGuess = p.shop.toLowerCase().replace(/[''`]/g,'').replace(/[^a-z0-9 ]/g,' ').trim()
    .split(/\s+/).filter(w=>!['auto','automotive','service','services','tire','tires','and','the','of',
      'repair','center','shop','car','truck','llc','inc','co','&','brothers','brother'].includes(w))
    .slice(0,2).join('') + '.com';

  const hasNotes = !!p.userNotes;

  return `
<div class="card ${stCl}" id="card-${p.id}">
  <div class="card-top">
    <div class="shop-name">${esc(p.shop)}</div>
    <span class="day-badge ${dayCl}">${p.day}</span>
  </div>
  ${p.address?`<div class="addr">📍 ${esc(p.address)}</div>`:''}
  ${p.phone?`<a class="phone" href="tel:${p.phone.replace(/\D/g,'')}">${esc(p.phone)}</a>`:'<div style="margin-bottom:7px;font-size:11px;color:var(--muted)">📞 Call ahead to confirm phone</div>'}
  <div class="tags">${tagsHtml}</div>
  ${p.notes?`<div class="sig-notes">${esc(p.notes)}</div>`:''}
  <div class="sig-row"><div class="dots">${dots}</div><span class="sig-lbl">${sigLbl}</span></div>
  <div class="verify">
    ${tags.includes('BG') ? `<a class="vbtn tb" href="https://bgprod.com/find-a-shop/" target="_blank" style="gap:4px"><img src="${BG_LOGO}" height="13" style="vertical-align:middle;display:block"> BG ✓</a>` : ''}
    ${tags.includes('Technet') ? `<a class="vbtn tp" href="https://www.technetprofessional.com/locator" target="_blank" style="gap:4px"><img src="${TN_LOGO}" height="11" style="vertical-align:middle;display:block"> TechNet ✓</a>` : ''}
    ${tags.includes('Fisher') ? `<a class="vbtn tf" href="https://www.federatedcc.com/locations.html" target="_blank" style="gap:4px"><img src="${FISHER_LOGO}" height="13" style="vertical-align:middle;display:block;border-radius:2px"> Fisher ✓</a>` : ''}
    ${tags.includes('FMP') ? `<a class="vbtn tfp" href="https://fmppartnersnetwork.com/shop-locator/" target="_blank" style="gap:4px"><img src="${FMP_LOGO}" height="13" style="vertical-align:middle;display:block;border-radius:2px"> FMP ✓</a>` : ''}
    ${tags.includes('RepairPal') ? `<a class="vbtn trp" href="https://repairpal.com/auto-repair-near-me" target="_blank" style="gap:4px"><img src="${RP_LOGO}" height="12" style="vertical-align:middle;display:block;border-radius:2px"> RepairPal ✓</a>` : ''}
    ${tags.includes('CARFAX') ? `<a class="vbtn tcfx" href="https://www.carfax.com/Auto-Repair" target="_blank" style="gap:4px"><img src="${CFX_LOGO}" height="11" style="vertical-align:middle;display:block;border-radius:2px"> CARFAX ✓</a>` : ''}
    ${tags.includes('Assoc') ? `<a class="vbtn tac" href="https://www.autocare.org/government-relations/become-an-advocate/state-associations" target="_blank">🔧 Assoc ✓</a>` : ''}
    <a class="vbtn" href="https://www.google.com/search?q=${shopQ}" target="_blank">🌐 Google</a>
    <a class="vbtn" href="https://www.google.com/search?q=site%3Asurecriticreports.com+${nameQ}" target="_blank">⭐ SureCritic</a>
    <a class="vbtn" href="https://www.google.com/search?q=site%3Aautotechiq.com+${nameQ}" target="_blank">🔧 AutoTechIQ</a>
    <a class="vbtn gd-btn" href="https://www.godaddy.com/domainsearch/find?checkAvail=1&domainToCheck=${encodeURIComponent(domainGuess)}" target="_blank">🌍 ${domainGuess}</a>
  </div>
  <div class="actions">
    <select class="status-sel" data-id="${p.id}">
      <option value="new"            ${p.status==='new'           ?'selected':''}>🔵 New</option>
      <option value="visited"        ${p.status==='visited'       ?'selected':''}>✅ Visited</option>
      <option value="demo-booked"    ${p.status==='demo-booked'   ?'selected':''}>📅 Demo booked</option>
      <option value="followup"       ${p.status==='followup'      ?'selected':''}>🔔 Follow-up</option>
      <option value="not-interested" ${p.status==='not-interested'?'selected':''}>❌ Not interested</option>
      <option value="won"            ${p.status==='won'           ?'selected':''}>🏆 Won</option>
      <option value="skip"           ${p.status==='skip'          ?'selected':''}>⬜ Skip</option>
    </select>
    <button class="notes-btn ${hasNotes?'has':''}" data-id="${p.id}" title="Notes">📝</button>
  </div>
  ${hasNotes?`<div class="notes-preview" onclick="toggleNotes('${p.id}')">📌 ${esc(p.userNotes)}</div>`:''}

</div>`;
}

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function mitchellScore(p) {
  const t = p.tags||[];
  let s = 0;
  if(t.includes('Mitchell'))   s+=2;
  if(t.includes('AutoTechIQ')) s+=2;
  if(t.includes('Technet'))    s+=1;
  if(t.includes('BG'))         s+=1;
  if(p.stars && parseFloat(p.stars)>=4.5) s+=1;
  return Math.min(s,5);
}

function onStatus(sel, silent) {
  const id = sel.dataset.id;
  statusMap[id] = sel.value;
  if (!silent) saveStatus(id);
  const p = currentPlan.find(x=>x.id===id);
  if(p) p.status = sel.value;
  const card = document.getElementById('card-'+id);
  if(card){
    ['sv','sf','sw','sn','sd'].forEach(c=>card.classList.remove(c));
    const cl={visited:'sv',followup:'sf',won:'sw','not-interested':'sn','demo-booked':'sd'}[sel.value];
    if(cl) card.classList.add(cl);
  }
  if (!silent) updateStats();
}

function toggleNotes(id) {
  const card = document.getElementById('card-'+id);
  const ta = card&&card.querySelector('.notes-area');
  if(!ta) return;
  const open = ta.style.display==='block';
  ta.style.display = open?'none':'block';
  if(!open) ta.focus();
}

function onNote(ta) {
  const id = ta.dataset.id, notes = ta.value.trim();
  notesMap[id] = notes;
  saveNotes(id);
  const p = currentPlan.find(x=>x.id===id);
  if(p) p.userNotes = notes;
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const btn = card.querySelector('.notes-btn');
  if(btn) btn.classList.toggle('has', !!notes);
  let prev = card.querySelector('.notes-preview');
  if(notes){
    if(!prev){ prev=document.createElement('div'); prev.className='notes-preview'; prev.onclick=()=>toggleNotes(id); ta.before(prev); }
    prev.textContent = '📌 '+notes;
  } else if(prev) prev.remove();
}

function updateStats() {
  document.getElementById('sTotal').textContent    = currentPlan.length;
  document.getElementById('sVisited').textContent  = currentPlan.filter(p=>p.status==='visited').length;
  document.getElementById('sFollowup').textContent = currentPlan.filter(p=>p.status==='followup').length;
  document.getElementById('sWon').textContent      = currentPlan.filter(p=>p.status==='won').length;
  document.getElementById('sMitchell').textContent = currentPlan.filter(p=>mitchellScore(p)>=3).length;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
